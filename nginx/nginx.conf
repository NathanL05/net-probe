server {
    listen 443 ssl;
    server_name pulsestack.local;

    ssl_certificate     certs/pulsestack.crt;
    ssl_certificate_key certs/pulsestack.key;

    location /metrics {
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://localhost:8000;
    }

    location /grafana {
        proxy_set_header X-Request-ID $request_id;
        proxy_pass http://localhost:3000;
    }

    location /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }
}